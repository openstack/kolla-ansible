---
- name: Ensuring config directories exist
  vars:
    service_name: "kolla-toolbox"
    service: "{{ kolla_toolbox_services[service_name] }}"
  ansible.builtin.file:
    path: "{{ node_config_directory }}/{{ service_name }}"
    state: "directory"
    owner: "{{ config_owner_user }}"
    group: "{{ config_owner_group }}"
    mode: "0770"
  become: true
  when: service | service_enabled_and_mapped_to_host

- name: Copying over TLS certificates
  ansible.builtin.include_tasks: copy-certs.yml
  when:
    - kolla_toolbox_copy_certs | bool

- name: Copying over config.json files for services
  ansible.builtin.template:
    src: "{{ item.key }}.json.j2"
    dest: "{{ node_config_directory }}/{{ item.key }}/config.json"
    mode: "0660"
  become: true
  with_dict: "{{ kolla_toolbox_services | select_services_enabled_and_mapped_to_host }}"

- name: Ensure RabbitMQ Erlang cookie exists
  become: true
  ansible.builtin.template:
    src: "rabbitmq-erlang.cookie.j2"
    dest: "{{ node_config_directory }}/kolla-toolbox/rabbitmq-erlang.cookie"
    mode: "0660"
  when:
    - kolla_toolbox_services['kolla-toolbox'] | service_enabled_and_mapped_to_host
    - enable_rabbitmq | bool

- name: Ensuring config directories have correct owner and permission
  become: true
  ansible.builtin.file:
    path: "{{ node_config_directory }}/{{ item.key }}"
    owner: "{{ config_owner_user }}"
    group: "{{ config_owner_group }}"
    mode: "0770"
  ignore_errors: "{{ ansible_check_mode }}"
  with_dict: "{{ kolla_toolbox_services | select_services_enabled_and_mapped_to_host }}"

- name: Copy rabbitmq-env.conf to kolla toolbox
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "{{ node_config_directory }}/kolla-toolbox/rabbitmq-env.conf"
    mode: "0600"
  with_first_found:
    - "{{ node_custom_config }}/kolla-toolbox/{{ inventory_hostname }}/rabbitmq-env.conf"
    - "{{ node_custom_config }}/kolla-toolbox/rabbitmq-env.conf"
    - "rabbitmq-env.conf.j2"
  become: true
  when:
    - kolla_toolbox_services['kolla-toolbox'] | service_enabled_and_mapped_to_host
    - enable_rabbitmq | bool

- name: Copy rabbitmq erl_inetrc to kolla toolbox
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "{{ node_config_directory }}/kolla-toolbox/erl_inetrc"
    mode: "0600"
  become: true
  with_first_found:
    - "{{ node_custom_config }}/kolla-toolbox/{{ inventory_hostname }}/erl_inetrc"
    - "{{ node_custom_config }}/kolla-toolbox/erl_inetrc"
    - "erl_inetrc.j2"
  when:
    - kolla_toolbox_services['kolla-toolbox'] | service_enabled_and_mapped_to_host
    - enable_rabbitmq | bool

- name: Copy clouds.yaml to kolla toolbox
  ansible.builtin.template:
    src: "clouds.yaml.j2"
    dest: "{{ node_config_directory }}/kolla-toolbox/clouds.yaml"
    mode: "0660"
  become: true
  when:
    - kolla_toolbox_services['kolla-toolbox'] | service_enabled_and_mapped_to_host
