---
- name: Ensuring config directories exist
  ansible.builtin.file:
    path: "{{ node_config_directory }}/{{ item.key }}"
    state: "directory"
    owner: "{{ config_owner_user }}"
    group: "{{ config_owner_group }}"
    mode: "0770"
  become: true
  with_dict: "{{ blazar_services | select_services_enabled_and_mapped_to_host }}"

- name: Check if policies shall be overwritten
  ansible.builtin.stat:
    path: "{{ item }}"
  run_once: true
  delegate_to: localhost
  register: blazar_policy
  with_first_found:
    - files: "{{ supported_policy_format_list }}"
      paths:
        - "{{ node_custom_config }}/blazar/"
      skip: true

- name: Set blazar policy file
  ansible.builtin.set_fact:
    blazar_policy_file: "{{ blazar_policy.results.0.stat.path | basename }}"
    blazar_policy_file_path: "{{ blazar_policy.results.0.stat.path }}"
  when:
    - blazar_policy.results | length > 0

- name: Copying over TLS certificates
  ansible.builtin.include_tasks: copy-certs.yml
  when:
    - blazar_copy_certs | bool

- name: Copying over config.json files for services
  ansible.builtin.template:
    src: "{{ item.key }}.json.j2"
    dest: "{{ node_config_directory }}/{{ item.key }}/config.json"
    mode: "0660"
  become: true
  with_dict: "{{ blazar_services | select_services_enabled_and_mapped_to_host }}"

- name: "Configure uWSGI for blazar-api"
  ansible.builtin.include_role:
    name: service-uwsgi-config
  vars:
    project_services: "{{ blazar_services }}"
    service: "{{ blazar_services['blazar-api'] }}"
    service_name: "blazar-api"
    service_uwsgi_config_http_port: "{{ blazar_api_listen_port }}"
    service_uwsgi_config_log_file_chmod: "644"
    service_uwsgi_config_module: "{{ service.wsgi }}"
    service_uwsgi_config_uid: "blazar"
    service_uwsgi_config_workers: "{{ blazar_api_workers }}"
  when:
    - service | service_enabled_and_mapped_to_host

- name: Copying over blazar.conf
  vars:
    service_name: "{{ item.key }}"
  merge_configs:
    sources:
      - "{{ role_path }}/templates/blazar.conf.j2"
      - "{{ node_custom_config }}/global.conf"
      - "{{ node_custom_config }}/blazar.conf"
      - "{{ node_custom_config }}/blazar/{{ item.key }}.conf"
      - "{{ node_custom_config }}/blazar/{{ inventory_hostname }}/blazar.conf"
    dest: "{{ node_config_directory }}/{{ item.key }}/blazar.conf"
    mode: "0660"
  become: true
  with_dict: "{{ blazar_services | select_services_enabled_and_mapped_to_host }}"

- name: Copying over existing policy file
  ansible.builtin.template:
    src: "{{ blazar_policy_file_path }}"
    dest: "{{ node_config_directory }}/{{ item.key }}/{{ blazar_policy_file }}"
    mode: "0660"
  become: true
  when:
    - blazar_policy_file is defined
  with_dict: "{{ blazar_services | select_services_enabled_and_mapped_to_host }}"
