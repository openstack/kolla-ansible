---
- name: Import tasks from version-check.yml
  ansible.builtin.import_tasks: version-check.yml

- name: Include tasks from remove-ha-all-policy.yml
  ansible.builtin.include_tasks: remove-ha-all-policy.yml

- name: Configure rabbitmq
  ansible.builtin.import_tasks: config.yml

- name: Check rabbitmq containers
  ansible.builtin.import_tasks: check-containers.yml

- name: Bootstrap rabbitmq service
  ansible.builtin.import_tasks: bootstrap.yml
