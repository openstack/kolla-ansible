---
- name: Check RabbitMQ version compatibility
  delegate_to: "{{ groups[role_rabbitmq_groups] | first }}"
  run_once: true
  tags: rabbitmq-version-check
  vars:
    service_name: "rabbitmq"
    service: "{{ rabbitmq_services[service_name] }}"
  block:
    - name: Get container facts
      become: true
      kolla_container_facts:
        action: get_containers
        container_engine: "{{ kolla_container_engine }}"
        name:
          - "{{ service.container_name }}"
      register: container_facts

    - name: Check RabbitMQ version upgrade compatibility
      when: container_facts.containers[service.container_name] is defined
      block:
        - name: Get current RabbitMQ version
          become: true
          ansible.builtin.command: "{{ kolla_container_engine }} exec {{ service.container_name }} rabbitmqctl --version"
          register: rabbitmq_version_current
          changed_when: false

        - name: Get new RabbitMQ version
          become: true
          vars:
            rabbitmq_container: "{{ rabbitmq_services['rabbitmq'] }}"
          kolla_container:
            action: "start_container"
            command: "rabbitmqctl --version"
            common_options: "{{ docker_common_options }}"
            container_engine: "{{ kolla_container_engine }}"
            detach: false
            environment:
              KOLLA_CONFIG_STRATEGY: "{{ config_strategy }}"
            image: "{{ rabbitmq_container.image }}"
            name: "rabbitmq_version_check"
            restart_policy: oneshot
            volumes: "{{ rabbitmq_default_volumes + rabbitmq_extra_volumes }}"
          register: rabbitmq_version_new
          changed_when: false
          failed_when: false
          check_mode: false

        - name: Parse RabbitMQ versions
          ansible.builtin.set_fact:
            ver_curr_raw: "{{ rabbitmq_version_current.stdout | trim }}"
            ver_new_raw: "{{ rabbitmq_version_new.stdout | trim }}"

        - name: Calculate Major and Minor components
          ansible.builtin.set_fact:
            curr_major: "{{ ver_curr_raw.split('.')[0] }}"
            curr_minor: "{{ ver_curr_raw.split('.')[1] }}"
            new_major: "{{ ver_new_raw.split('.')[0] }}"
            new_minor: "{{ ver_new_raw.split('.')[1] }}"

        - name: Determine Short Versions (X.Y)
          ansible.builtin.set_fact:
            ver_curr_short: "{{ curr_major }}.{{ curr_minor }}"
            ver_new_short: "{{ new_major }}.{{ new_minor }}"

        - name: Check version upgrade validity
          vars:
            is_standard_upgrade: >-
              {{ (curr_major == new_major) and (new_minor | int == curr_minor | int + 1) }}
            is_allowed_path: >-
              {{
                 ver_curr_short in rabbitmq_allowed_upgrades and
                 ver_new_short in rabbitmq_allowed_upgrades[ver_curr_short]
              }}
            suggested_next_version: >-
              {{ curr_major }}.{{ curr_minor | int + 1 }}

          ansible.builtin.assert:
            that:
              - is_standard_upgrade or is_allowed_path or (ver_curr_short == ver_new_short)
            fail_msg: >
              Invalid upgrade path detected!

              You are trying to go from RabbitMQ {{ ver_curr_short }} ({{ ver_curr_raw }}) to {{ ver_new_short }} ({{ ver_new_raw }}).

              Allowed paths logic:
              1. Standard minor version upgrade (Current + 1). Example: {{ suggested_next_version }}.
              2. Explicit paths defined in role defaults.
                 {% if ver_curr_short in rabbitmq_allowed_upgrades %}
                 Allowed jumps for your version: {{ rabbitmq_allowed_upgrades[ver_curr_short] }}.
                 {% else %}
                 No explicit jumps defined for your version.
                 {% endif %}

              Please upgrade to an intermediate version first.

        - name: Catch when RabbitMQ is being downgraded
          ansible.builtin.assert:
            that: ver_curr_raw is version(ver_new_raw, 'le', version_type='semver')
            fail_msg: >
              Looks like you're about to downgrade RabbitMQ from version {{ ver_curr_raw }} to version {{ ver_new_raw }}.
              If you're absolutely certain you want to do this, please skip the tag `rabbitmq-version-check`.
