---
- name: Running Heat bootstrap container
  vars:
    heat_api: "{{ heat_services['heat-api'] }}"
  become: true
  kolla_container:
    action: "start_container"
    common_options: "{{ docker_common_options }}"
    detach: false
    environment:
      KOLLA_BOOTSTRAP:
      KOLLA_CONFIG_STRATEGY: "{{ config_strategy }}"
      OS_AUTH_URL: "{{ keystone_internal_url }}"
      OS_IDENTITY_API_VERSION: "3"
      OS_INTERFACE: "internal"
      OS_USERNAME: "{{ keystone_admin_user }}"
      OS_PASSWORD: "{{ keystone_admin_password }}"
      OS_PROJECT_NAME: "{{ keystone_admin_project }}"
      OS_USER_DOMAIN_NAME: "{{ default_user_domain_name }}"
      OS_REGION_NAME: "{{ openstack_region_name }}"
      OS_CACERT: "{{ openstack_cacert | default(omit) }}"
      HEAT_DOMAIN_ADMIN_PASSWORD: "{{ heat_domain_admin_password }}"
    image: "{{ heat_api.image }}"
    labels:
      BOOTSTRAP:
    name: "bootstrap_heat"
    restart_policy: oneshot
    volumes: "{{ heat_api.volumes | reject('equalto', '') | list }}"
  run_once: true
  delegate_to: "{{ groups[heat_api.group][0] }}"
