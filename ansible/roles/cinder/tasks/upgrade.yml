---
# NOTE (duonghq): I break config into 2 phases to prevent new version
# of service start if node or process in node crash accidentally.
- name: Configure cinder
  ansible.builtin.include_tasks: config.yml
  when: inventory_hostname == groups["cinder-api"][0]

- name: Run cinder bootstrap container
  ansible.builtin.import_tasks: bootstrap_service.yml

- name: Configure cinder
  ansible.builtin.import_tasks: config.yml

- name: Check cinder containers
  ansible.builtin.import_tasks: check-containers.yml

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Reload cinder services
  ansible.builtin.import_tasks: reload.yml

# TODO(mnasiadka): Remove me in 2026.2
- name: Remove cinderv3 catalog entries
  vars:
    _cinder_volumev3:
      - name: "cinderv3"
        type: "volumev3"
        description: "Openstack Block Storage (deprecated)"
        endpoints: []
        state: absent
    service_ks_register_auth: "{{ openstack_cinder_auth }}"
    service_ks_register_services: "{{ _cinder_volumev3 }}"
  ansible.builtin.import_role:
    name: service-ks-register

- name: Running Cinder online schema migration
  vars:
    cinder_api: "{{ cinder_services['cinder-api'] }}"
  become: true
  kolla_container:
    action: "start_container"
    common_options: "{{ docker_common_options }}"
    detach: false
    environment:
      KOLLA_OSM:
      KOLLA_CONFIG_STRATEGY: "{{ config_strategy }}"
    image: "{{ cinder_api.image }}"
    labels:
      BOOTSTRAP:
    name: "bootstrap_cinder"
    restart_policy: oneshot
    volumes: "{{ cinder_api.volumes }}"
  run_once: true
  delegate_to: "{{ groups[cinder_api.group][0] }}"
