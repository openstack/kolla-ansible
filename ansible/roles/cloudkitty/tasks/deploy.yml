---
- name: Register cloudkitty in Keystone
  ansible.builtin.import_tasks: register.yml

- name: Configure cloudkitty
  ansible.builtin.import_tasks: config.yml

- name: Check cloudkitty containers
  ansible.builtin.import_tasks: check-containers.yml

- name: Clone cloudkitty repository
  ansible.builtin.include_tasks: clone.yml
  when: cloudkitty_dev_mode | bool

- name: Bootstrap cloudkitty service
  ansible.builtin.import_tasks: bootstrap.yml

- name: Flush handlers
  ansible.builtin.meta: flush_handlers
