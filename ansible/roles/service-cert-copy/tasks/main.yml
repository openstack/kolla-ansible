---
- name: "Copying over extra CA certificates for {{ project_name }}"
  become: true
  ansible.builtin.copy:
    src: "{{ kolla_certificates_dir }}/ca/"
    dest: "{{ node_config_directory }}/{{ item.key }}/ca-certificates"
    mode: "0644"
  when:
    - kolla_copy_ca_into_containers | bool
    - not (item.value.iterate | default(False)) | bool
  with_dict: "{{ project_services | select_services_enabled_and_mapped_to_host }}"

# NOTE(dougszu): For current iterable services, we only need CA certs
- name: "Check containers that require iteration for {{ kolla_role_name | default(project_name) }}"
  vars:
    service: "{{ outer_item.value }}"
  ansible.builtin.include_tasks: iterated.yml
  loop: "{{ project_services | select_services_enabled_and_mapped_to_host | dict2items }}"
  loop_control:
    loop_var: outer_item
  when:
    - (service.iterate | default(False)) | bool
    - kolla_copy_ca_into_containers | bool

- name: "Copying over backend internal TLS certificate for {{ project_name }}"
  vars:
    certs:
      - "{{ kolla_certificates_dir }}/{{ inventory_hostname }}/{{ project_name }}-cert.pem"
      - "{{ kolla_certificates_dir }}/{{ inventory_hostname }}-cert.pem"
      - "{{ kolla_certificates_dir }}/{{ project_name }}-cert.pem"
      - "{{ kolla_tls_backend_cert }}"
    backend_tls_cert: "{{ lookup('first_found', certs) }}"
  ansible.builtin.copy:
    src: "{{ backend_tls_cert }}"
    dest: "{{ node_config_directory }}/{{ item.key }}/{{ project_name }}-cert.pem"
    mode: "0644"
  become: true
  when:
    - kolla_copy_backend_tls_files | bool
    - inventory_hostname is in groups["tls-backend"]
  with_dict: "{{ project_services | select_services_enabled_and_mapped_to_host }}"

- name: "Copying over backend internal TLS key for {{ project_name }}"
  vars:
    keys:
      - "{{ kolla_certificates_dir }}/{{ inventory_hostname }}/{{ project_name }}-key.pem"
      - "{{ kolla_certificates_dir }}/{{ inventory_hostname }}-key.pem"
      - "{{ kolla_certificates_dir }}/{{ project_name }}-key.pem"
      - "{{ kolla_tls_backend_key }}"
    backend_tls_key: "{{ lookup('first_found', keys) }}"
  ansible.builtin.copy:
    src: "{{ backend_tls_key }}"
    dest: "{{ node_config_directory }}/{{ item.key }}/{{ project_name }}-key.pem"
    mode: "0600"
  become: true
  when:
    - kolla_copy_backend_tls_files | bool
    - inventory_hostname is in groups["tls-backend"]
  with_dict: "{{ project_services | select_services_enabled_and_mapped_to_host }}"
