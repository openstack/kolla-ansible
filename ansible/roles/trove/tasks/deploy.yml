---
- name: Register trove in Keystone
  ansible.builtin.import_tasks: register.yml

- name: Configure trove
  ansible.builtin.import_tasks: config.yml

- name: Check trove containers
  ansible.builtin.import_tasks: check-containers.yml

- name: Clone trove repository
  ansible.builtin.include_tasks: clone.yml
  when: trove_dev_mode | bool

- name: Bootstrap trove service
  ansible.builtin.import_tasks: bootstrap.yml

- name: Flush handlers
  ansible.builtin.meta: flush_handlers
