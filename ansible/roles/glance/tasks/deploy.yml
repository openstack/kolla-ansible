---
- name: Register glance in Keystone
  ansible.builtin.import_tasks: register.yml

- name: Configure glance
  ansible.builtin.import_tasks: config.yml

- name: Check glance containers
  ansible.builtin.import_tasks: check-containers.yml

- name: Clone glance repository
  ansible.builtin.include_tasks: clone.yml
  when:
    - glance_dev_mode | bool

- name: Bootstrap glance service
  ansible.builtin.import_tasks: bootstrap.yml

- name: Flush handlers
  ansible.builtin.meta: flush_handlers
