---
deprecations:
  - |
    Remove option to set OIDCHTMLErrorTemplate in Debian 13 and Rocky 10.
    As this option was removed in 2.4.14 version of modoidc auth plugin.
    It is still present in Ubuntu Noble and can be used there. This applies
    only when using `keystone_wsgi_provider: apache`, which is not the default.
fixes:
  - |
    Fixes federation path for new keystone-httpd container. Previously
    the normal keystone container running apache wsgi was used. After
    migration to the uwsgi container the federation logic remained in
    the keystone-httpd container, but the federation files were never
    mounted there.
    `LP#2134455 <https://launchpad.net/bugs/2134455>`__.
other:
  - |
    Add more CI coverage for Federation codepath. Migrate ansible to use
    `openstack.cloud` ansible collection modules for configuring federation.
    Previously it was done using python-openstackclient.
