---
features:
  - |
    The RabbitMQ upgrade path validation now supports explicitly allowed
    version jumps (e.g., major or multi-minor upgrades) via the
    ``rabbitmq_allowed_upgrades`` variable. This allows operators to
    manage supported RabbitMQ upgrade paths through role defaults or
    ``globals.yml`` without modifying the core Ansible task files.
upgrade:
  - |
    Adds support for seamless RabbitMQ 4.2 upgrades by defining the
    required version jump paths in the default configuration.
