---
features:
  - |
    Standardized health check endpoints for OpenStack API
    services and supporting components (Grafana, etcd, influxdb,
    rabbitmq). Both HAProxy and Docker health checks now use
    dedicated endpoints like **/healthcheck**, **/api/health**,
    or service-specific paths for consistent and reliable detection.

    Health checks now explicitly expect HTTP 200 status codes
    and use standardized curl commands across all services.

    Docker container health checks have been unified with
    HAProxy configurations, using the same dedicated endpoints.
