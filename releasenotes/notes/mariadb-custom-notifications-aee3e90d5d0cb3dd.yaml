---
features:
  - |
    Adds support for custom MariaDB Galera notification scripts.
    Operators can provide a ``wsrep-notify.sh`` script in the custom
    config directory (``/etc/kolla/config/mariadb/``). When detected,
    Kolla Ansible configures MariaDB to execute it on cluster state
    changes, enabling integration with Prometheus Alertmanager or
    custom logging.
