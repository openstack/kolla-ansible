---
features:
  - |
    Adds ``valkey`` role.
upgrade:
  - |
    Adds the ``kolla-ansible migrate-valkey`` command for manual migration
    from Redis to Valkey. One use case is migrating a Rocky Linux 9 based
    2025.1 (Epoxy) deployment to Rocky Linux 10 before upgrading to 2025.2
    (Flamingo) or 2026.1 (Gazpacho).
