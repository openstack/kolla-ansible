---
upgrade:
  - |
    ``common`` Ansible role has been renamed to ``kolla_toolbox``.
    Also the ``kolla-toolbox`` Ansible inventory group has been renamed
    to ``kolla_toolbox`` to be in line with Ansible requirements.
    The tag for ``kolla_toolbox`` deployment task has also been
    renamed.
    Users should update their inventories and inventory overrides to
    reflect this change.
