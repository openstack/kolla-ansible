---
features:
  - |
    CloudKitty v1 API does not support pagination, which may require increasing
    timeouts for large requests. Adds two HAProxy timeout variables for the
    CloudKitty API: ``haproxy_cloudkitty_api_client_timeout`` and
    ``haproxy_cloudkitty_api_server_timeout``. These variables are used to
    populate HAProxy's ``frontend_http_extra`` and ``backend_http_extra`` for
    the ``cloudkitty_api`` and ``cloudkitty_api_external`` listeners. The
    defaults are set to the values of ``haproxy_client_timeout`` and
    ``haproxy_server_timeout``.
