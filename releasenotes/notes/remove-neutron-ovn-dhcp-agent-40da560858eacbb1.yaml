---
upgrade:
  - Support for running the Neutron DHCP agent in ML2/OVN deployments
    (``neutron_ovn_dhcp_agent``) has been removed. OVN now natively
    answers DHCP queries for bare metal ports (port type ``external``),
    so the agent is no longer needed. ``neutron_ovn_dhcp_agent`` should
    no longer be set.
