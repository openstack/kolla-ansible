---
fixes:
  - |
    Fixes default ulimits for Debian-family container engines when using
    containerd. Previously, ulimits were not enforced by default, which
    could lead to missing `nofile` limits and service startup failures.

    This change introduces sane default ulimit values for Debian-based
    distributions while keeping existing EL9 behavior unchanged.

    `LP#2132378 <https://bugs.launchpad.net/bugs/2132378>`__
