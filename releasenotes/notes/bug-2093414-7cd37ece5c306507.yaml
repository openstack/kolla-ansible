---
upgrade:
  - |
    The default session cache backend for Horizon has changed when
    Valkey is enabled. If ``enable_valkey`` is set to ``true``,
    Valkey will be used as the preferred backend to improve
    availability.
fixes:
  - |
    Improves Horizon availability when cache nodes fail by adding
    support for Valkey as a session cache backend.
    `LP#2093414 <https://launchpad.net/bugs/2093414>`__
