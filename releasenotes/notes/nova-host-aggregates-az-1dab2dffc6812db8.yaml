---
features:
  - |
    Adds support for managing Nova host aggregates and availability zones via
    Kolla Ansible inventory variables. Set ``nova_compute_availability_zone``
    per compute host or group to assign it to an AZ-backed host aggregate.
    Set ``nova_compute_aggregates`` (a list) to assign a host to one or more
    arbitrary host aggregates. Aggregates are created if they do not exist, and
    host memberships are reconciled on every deploy/reconfigure run.
