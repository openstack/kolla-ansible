---
features:
  - |
    Add support for deploying ProxySQL 3.0.x on OpenStack 2025.1 system.
    ProxySQL 2.7.x, which is the default version of ProxySQL of 2025.1, has a
    bug that `SSL handshake does not send full certificate
    chain <https://github.com/sysown/proxysql/issues/4877>`__.
    This causes database TLS verification failure when users use intermediate
    certificate.
    This bug was only fixed on ProxySQL 3.0.x release.
    Users can deploy/upgrade ProxySQL to 3.0.x by setting
    ``proxysql_version`` to 3.
