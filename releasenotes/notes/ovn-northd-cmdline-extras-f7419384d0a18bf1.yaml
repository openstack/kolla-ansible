---
features:
  - |
    Adds support for passing additional command-line arguments to the
    ``ovn-northd`` daemon via the ``ovn_northd_cmdline_extras`` variable.
    This allows operators to customize ovn-northd behavior, such as setting
    thread count (``--n-threads``), enabling parallel build
    (``--use-parallel-build``), or tuning the inactivity probe timeout
    (``--inactivity-probe``).
