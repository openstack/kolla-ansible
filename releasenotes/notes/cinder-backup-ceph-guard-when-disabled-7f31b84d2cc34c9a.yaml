---
fixes:
  - |
    Fixes cinder external Ceph configuration tasks failing when
    ``enable_cinder_backup`` is disabled but ``cinder_backup_driver`` remains
    set to ``ceph``.
    The cinder role no longer evaluates ``cinder_backup_ceph_backend`` for
    external Ceph config and keyring loops unless cinder-backup is enabled.
    `LP#2148771 <https://launchpad.net/bugs/2148771>`__
