---
fixes:
  - |
    Fixes bug `LP#2150449 <https://bugs.launchpad.net/kolla-ansible/+bug/2150449>`__
    where ProxySQL's database internal TLS fails when users use chain of
    certificates (e.g. use of intermediate certificates).

    Users who are affected by this bug needs to create a file
    ``proxysql-ca.pem`` at ``certificates_internal_dir``.
    This file needs to be a copy of the intermediate certificate (i.e.
    certificate that signed database internal TLS)

    Users who are not affected by this bug does not need to do
    anything.
